<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Zone Converter | WorldClock.live</title>
<meta name="description" content="Free time zone converter. Convert time between São Paulo, New York, London, Tokyo and 100+ cities worldwide.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e;
    --card: #111827;
    --accent: #38bdf8;
    --accent2: #818cf8;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --border: rgba(56,189,248,0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(56,189,248,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  header {
    width: 100%;
    max-width: 720px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }
  header a {
    color: var(--accent);
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
  }
  header a:hover { color: var(--text); }
  h1 {
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }
  .main { width: 100%; max-width: 720px; display: flex; flex-direction: column; gap: 20px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
  }
  .card-title {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-bottom: 20px;
  }
  .converter-grid {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 16px;
    align-items: end;
  }
  .field label {
    display: block;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    font-family: 'Space Mono', monospace;
  }
  select, input[type="datetime-local"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
    cursor: pointer;
  }
  select:focus, input[type="datetime-local"]:focus { border-color: var(--accent); }
  select option { background: #1e293b; }
  .swap-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 44px; height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--accent);
    font-size: 20px;
    transition: all 0.2s;
    flex-shrink: 0;
    margin-bottom: 0;
  }
  .swap-btn:hover { background: var(--accent); color: #0a0f1e; border-color: var(--accent); }
  .time-input-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 16px;
  }
  .btn-convert {
    width: 100%;
    margin-top: 20px;
    padding: 14px;
    background: var(--accent);
    color: #0a0f1e;
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    letter-spacing: 0.5px;
  }
  .btn-convert:hover { background: #7dd3fc; }
  .result-card {
    background: var(--bg);
    border: 1px solid rgba(56,189,248,0.25);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    display: none;
    margin-top: 20px;
  }
  .result-card.show { display: block; }
  .result-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); font-family: 'Space Mono', monospace; margin-bottom: 8px; }
  .result-time { font-family: 'Space Mono', monospace; font-size: 42px; font-weight: 700; color: var(--accent); line-height: 1; }
  .result-date { font-size: 14px; color: var(--muted); margin-top: 6px; }
  .result-zone { font-size: 12px; color: var(--accent2); margin-top: 4px; font-family: 'Space Mono', monospace; }
  .result-arrow {
    font-size: 13px;
    color: var(--muted);
    margin: 8px 0;
    font-family: 'Space Mono', monospace;
  }
  .quick-title {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-bottom: 16px;
  }
  .quick-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px;
  }
  .quick-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
    transition: border-color 0.2s;
  }
  .quick-card:hover { border-color: var(--accent); }
  .quick-city { font-size: 13px; font-weight: 700; color: var(--text); }
  .quick-time { font-family: 'Space Mono', monospace; font-size: 20px; color: var(--accent); margin: 4px 0; }
  .quick-offset { font-size: 11px; color: var(--muted); }
  footer { margin-top: 32px; color: var(--muted); font-size: 12px; font-family: 'Space Mono', monospace; text-align: center; }
  footer a { color: var(--accent); text-decoration: none; }
  @media (max-width: 560px) {
    .converter-grid { grid-template-columns: 1fr; }
    .swap-btn { width: 100%; }
    .time-input-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<header>
  <a href="../index.html">← World Clock</a>
  <h1>Time Zone Converter</h1>
  <span style="width:120px"></span>
</header>
<div class="main">

  <!-- Converter -->
  <div class="card">
    <div class="card-title">Convert Time Between Zones</div>
    <div class="converter-grid">
      <div class="field">
        <label>From</label>
        <select id="fromZone"></select>
      </div>
      <button class="swap-btn" onclick="swapZones()" title="Swap">⇄</button>
      <div class="field">
        <label>To</label>
        <select id="toZone"></select>
      </div>
    </div>
    <div class="time-input-row">
      <div class="field">
        <label>Date</label>
        <input type="date" id="inputDate">
      </div>
      <div class="field">
        <label>Time</label>
        <input type="time" id="inputTime">
      </div>
    </div>
    <button class="btn-convert" onclick="convertTime()">Convert →</button>
    <div class="result-card" id="resultCard">
      <div class="result-label" id="resultFromLabel"></div>
      <div class="result-time" id="resultFromTime"></div>
      <div class="result-date" id="resultFromDate"></div>
      <div class="result-arrow">↓ converted to ↓</div>
      <div class="result-label" id="resultToLabel"></div>
      <div class="result-time" id="resultToTime"></div>
      <div class="result-date" id="resultToDate"></div>
      <div class="result-zone" id="resultDiff"></div>
    </div>
  </div>

  <!-- Live clocks -->
  <div class="card">
    <div class="quick-title">Live World Clocks</div>
    <div class="quick-grid" id="quickGrid"></div>
  </div>

</div>
<footer>
  <a href="../index.html">WorldClock.live</a> — Free Productivity Tools
</footer>
<script>
  const ZONES = [
    { city: 'São Paulo',     tz: 'America/Sao_Paulo' },
    { city: 'New York',      tz: 'America/New_York' },
    { city: 'Los Angeles',   tz: 'America/Los_Angeles' },
    { city: 'Chicago',       tz: 'America/Chicago' },
    { city: 'Toronto',       tz: 'America/Toronto' },
    { city: 'Mexico City',   tz: 'America/Mexico_City' },
    { city: 'Buenos Aires',  tz: 'America/Argentina/Buenos_Aires' },
    { city: 'Lima',          tz: 'America/Lima' },
    { city: 'Bogotá',        tz: 'America/Bogota' },
    { city: 'Santiago',      tz: 'America/Santiago' },
    { city: 'Rio de Janeiro',tz: 'America/Sao_Paulo' },
    { city: 'London',        tz: 'Europe/London' },
    { city: 'Paris',         tz: 'Europe/Paris' },
    { city: 'Berlin',        tz: 'Europe/Berlin' },
    { city: 'Madrid',        tz: 'Europe/Madrid' },
    { city: 'Rome',          tz: 'Europe/Rome' },
    { city: 'Amsterdam',     tz: 'Europe/Amsterdam' },
    { city: 'Stockholm',     tz: 'Europe/Stockholm' },
    { city: 'Warsaw',        tz: 'Europe/Warsaw' },
    { city: 'Moscow',        tz: 'Europe/Moscow' },
    { city: 'Dubai',         tz: 'Asia/Dubai' },
    { city: 'Riyadh',        tz: 'Asia/Riyadh' },
    { city: 'Mumbai',        tz: 'Asia/Kolkata' },
    { city: 'Dhaka',         tz: 'Asia/Dhaka' },
    { city: 'Bangkok',       tz: 'Asia/Bangkok' },
    { city: 'Singapore',     tz: 'Asia/Singapore' },
    { city: 'Tokyo',         tz: 'Asia/Tokyo' },
    { city: 'Seoul',         tz: 'Asia/Seoul' },
    { city: 'Shanghai',      tz: 'Asia/Shanghai' },
    { city: 'Jakarta',       tz: 'Asia/Jakarta' },
    { city: 'Nairobi',       tz: 'Africa/Nairobi' },
    { city: 'Lagos',         tz: 'Africa/Lagos' },
    { city: 'Cairo',         tz: 'Africa/Cairo' },
    { city: 'Johannesburg',  tz: 'Africa/Johannesburg' },
    { city: 'Maputo',        tz: 'Africa/Maputo' },
    { city: 'Accra',         tz: 'Africa/Accra' },
    { city: 'Sydney',        tz: 'Australia/Sydney' },
    { city: 'Melbourne',     tz: 'Australia/Melbourne' },
    { city: 'Auckland',      tz: 'Pacific/Auckland' },
  ];

  const QUICK = ['São Paulo','New York','London','Tokyo','Dubai','Sydney'];

  // Populate selects
  const fromZone = document.getElementById('fromZone');
  const toZone   = document.getElementById('toZone');

  ZONES.forEach((z, i) => {
    const o1 = new Option(z.city, z.tz);
    const o2 = new Option(z.city, z.tz);
    fromZone.add(o1);
    toZone.add(o2);
  });

  // Defaults: São Paulo → New York
  fromZone.value = 'America/Sao_Paulo';
  toZone.value   = 'America/New_York';

  // Set current date/time
  const now = new Date();
  document.getElementById('inputDate').value = now.toISOString().slice(0,10);
  document.getElementById('inputTime').value = now.toTimeString().slice(0,5);

  function swapZones() {
    const tmp = fromZone.value;
    fromZone.value = toZone.value;
    toZone.value = tmp;
  }

  function convertTime() {
    const dateVal = document.getElementById('inputDate').value;
    const timeVal = document.getElementById('inputTime').value;
    if (!dateVal || !timeVal) return;

    const fromTZ = fromZone.value;
    const toTZ   = toZone.value;
    const fromCity = ZONES.find(z => z.tz === fromTZ)?.city || fromTZ;
    const toCity   = ZONES.find(z => z.tz === toTZ)?.city   || toTZ;

    // Parse input as local time in fromTZ
    const inputStr = dateVal + 'T' + timeVal + ':00';

    // Format in source timezone
    const srcDate = new Date(inputStr);
    const fmtTime = new Intl.DateTimeFormat('en-US', {
      timeZone: fromTZ,
      hour: '2-digit', minute: '2-digit', hour12: false
    });
    const fmtDate = new Intl.DateTimeFormat('en-US', {
      timeZone: fromTZ,
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    // Convert: get UTC ms, then display in target TZ
    // We treat input as being in fromTZ
    const utcMs = getUTCfromTZ(dateVal, timeVal, fromTZ);
    const targetDate = new Date(utcMs);

    const toFmtTime = new Intl.DateTimeFormat('en-US', {
      timeZone: toTZ,
      hour: '2-digit', minute: '2-digit', hour12: false
    });
    const toFmtDate = new Intl.DateTimeFormat('en-US', {
      timeZone: toTZ,
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    // Offset diff
    const fromOffset = getTZOffset(utcMs, fromTZ);
    const toOffset   = getTZOffset(utcMs, toTZ);
    const diffH = (toOffset - fromOffset) / 60;
    const diffStr = diffH === 0 ? 'Same time zone' :
      (diffH > 0 ? '+' : '') + diffH + 'h difference';

    document.getElementById('resultFromLabel').textContent = fromCity;
    document.getElementById('resultFromTime').textContent  = timeVal;
    document.getElementById('resultFromDate').textContent  = fmtDate.format(srcDate);
    document.getElementById('resultToLabel').textContent   = toCity;
    document.getElementById('resultToTime').textContent    = toFmtTime.format(targetDate);
    document.getElementById('resultToDate').textContent    = toFmtDate.format(targetDate);
    document.getElementById('resultDiff').textContent      = diffStr;

    document.getElementById('resultCard').classList.add('show');
  }

  function getUTCfromTZ(dateStr, timeStr, tz) {
    // Use Intl to find what UTC time corresponds to this local time in tz
    const test = new Date(dateStr + 'T' + timeStr + ':00Z');
    const localStr = new Intl.DateTimeFormat('en-CA', {
      timeZone: tz,
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
      hour12: false
    }).format(test);
    // Approximate: adjust by offset
    const offset = getTZOffset(test.getTime(), tz);
    return test.getTime() - offset * 60 * 1000;
  }

  function getTZOffset(utcMs, tz) {
    const d = new Date(utcMs);
    const utcStr = d.toLocaleString('en-US', { timeZone: 'UTC', hour12: false,
      year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const tzStr  = d.toLocaleString('en-US', { timeZone: tz,  hour12: false,
      year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'});
    return (new Date(tzStr) - new Date(utcStr)) / 60000;
  }

  // Live quick clocks
  function updateQuickClocks() {
    const grid = document.getElementById('quickGrid');
    grid.innerHTML = QUICK.map(city => {
      const z = ZONES.find(z => z.city === city);
      if (!z) return '';
      const now = new Date();
      const t = new Intl.DateTimeFormat('en-US', {
        timeZone: z.tz, hour: '2-digit', minute: '2-digit', hour12: false
      }).format(now);
      const offset = getTZOffset(now.getTime(), z.tz);
      const offH = offset / 60;
      const offStr = 'UTC' + (offH >= 0 ? '+' : '') + offH;
      return `<div class="quick-card">
        <div class="quick-city">${city}</div>
        <div class="quick-time">${t}</div>
        <div class="quick-offset">${offStr}</div>
      </div>`;
    }).join('');
  }

  updateQuickClocks();
  setInterval(updateQuickClocks, 1000);
</script>
</body>
</html>
